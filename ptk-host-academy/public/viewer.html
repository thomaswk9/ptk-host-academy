<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PTK · 3D Apartment Viewer (test)</title>
<link rel="apple-touch-icon" href="/images/icon-192.png">
<meta name="theme-color" content="#1C2280">
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&family=Lora:wght@600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0e;color:#fff;font-family:'Nunito Sans',sans-serif;-webkit-tap-highlight-color:transparent}
#scene{position:absolute;inset:0}
.panel{position:absolute;background:rgba(15,17,22,0.92);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px;z-index:10}
.panel h4{font-size:9px;letter-spacing:0.25em;color:rgba(255,255,255,0.4);margin-bottom:6px;font-weight:700;text-transform:uppercase}
.btn-row{display:flex;flex-wrap:wrap;gap:4px}
.btn{padding:7px 11px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.75);border:none;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:0.04em;transition:all 0.15s}
.btn:hover{background:rgba(255,255,255,0.12);color:#fff}
.btn.active{background:#fff;color:#0a0a0e}
.tier-btn.active{background:#c4985a;color:#0a0a0e}
.time-btn.active{background:#c4985a;color:#0a0a0e}
.upgrade-list{display:flex;flex-direction:column;gap:4px;max-height:50vh;overflow-y:auto;padding-right:4px}
.upgrade-row{display:flex;align-items:center;gap:8px;padding:5px 8px;background:rgba(255,255,255,0.03);border-radius:5px;cursor:pointer;font-size:11px;color:rgba(255,255,255,0.7)}
.upgrade-row:hover{background:rgba(255,255,255,0.07);color:#fff}
.upgrade-row input{accent-color:#c4985a}
.upgrade-row.on{background:rgba(196,152,90,0.15);color:#fff}
#header{top:18px;left:18px;max-width:240px}
#tiers{top:18px;left:50%;transform:translateX(-50%)}
#time{top:18px;right:18px}
#mode{bottom:24px;left:50%;transform:translateX(-50%)}
#upgrades{bottom:24px;right:18px;max-width:230px}
#help{bottom:24px;left:18px;color:rgba(255,255,255,0.4);font-size:9px;letter-spacing:0.1em;line-height:1.7;text-transform:uppercase;pointer-events:none}
#joystick{position:absolute;bottom:96px;left:24px;width:110px;height:110px;border-radius:55px;background:rgba(15,17,22,0.7);border:1px solid rgba(255,255,255,0.15);display:none;touch-action:none;z-index:20}
#joyKnob{position:absolute;left:50%;top:50%;width:42px;height:42px;border-radius:21px;background:rgba(196,152,90,0.85);transform:translate(-50%,-50%);pointer-events:none}
.title-line{font-size:10px;letter-spacing:0.3em;color:rgba(255,255,255,0.45);margin-bottom:3px;text-transform:uppercase}
.title-main{font-family:'Lora',serif;font-size:16px;font-weight:600;letter-spacing:-0.01em}
.title-sub{font-size:10px;color:rgba(255,255,255,0.5);margin-top:3px}
@media (max-width:560px){
  #header{max-width:170px;padding:8px}
  #upgrades{max-width:170px;font-size:10px}
  .upgrade-row{font-size:10px}
  .btn{padding:6px 8px;font-size:10px}
  .panel{padding:8px}
}
</style>
</head>
<body>

<div id="scene"></div>

<!-- Header -->
<div id="header" class="panel">
  <div class="title-line">PTK · 3D Viewer</div>
  <div class="title-main" id="tierName">Notting Hill</div>
  <div class="title-sub" id="upCount">0 upgrades · day</div>
</div>

<!-- Tier selector -->
<div id="tiers" class="panel">
  <h4>Property tier</h4>
  <div class="btn-row">
    <button class="btn tier-btn active" data-tier="0">Notting Hill</button>
    <button class="btn tier-btn" data-tier="1">Shoreditch</button>
    <button class="btn tier-btn" data-tier="2">Chelsea</button>
    <button class="btn tier-btn" data-tier="3">Mayfair</button>
    <button class="btn tier-btn" data-tier="4">Kensington</button>
  </div>
</div>

<!-- Time of day -->
<div id="time" class="panel">
  <h4>Time</h4>
  <div class="btn-row">
    <button class="btn time-btn active" data-time="day">Day</button>
    <button class="btn time-btn" data-time="evening">Eve</button>
    <button class="btn time-btn" data-time="night">Night</button>
  </div>
</div>

<!-- Mode selector -->
<div id="mode" class="panel">
  <h4>View</h4>
  <div class="btn-row">
    <button class="btn mode-btn active" data-mode="orbit">Orbit</button>
    <button class="btn mode-btn" data-mode="top">Plan</button>
    <button class="btn mode-btn" data-mode="walk">Walk</button>
    <button class="btn" id="roofBtn">Roof off</button>
  </div>
</div>

<!-- Upgrades panel -->
<div id="upgrades" class="panel">
  <h4>Upgrades · click to toggle</h4>
  <div class="upgrade-list" id="upList"></div>
</div>

<!-- Help text -->
<div id="help">
  <div id="helpText">Drag · Rotate</div>
</div>

<!-- Touch joystick (only shown in walk mode on touch devices) -->
<div id="joystick"><div id="joyKnob"></div></div>

<script type="module">
import { Apartment3D } from './apartment3d.js';

// All visible-impact upgrades in the order we want to show them
const UPGRADES = [
  // Tier 1 (Notting Hill) — most basic
  { id: 'smart_tv', label: '📺 Smart TV', tier: 1 },
  { id: 'coffee_machine', label: '☕ Coffee machine', tier: 1 },
  { id: 'premium_bedding', label: '🛏️ Hotel-grade bedding', tier: 1 },
  { id: 'artwork', label: '🖼️ Statement artwork', tier: 1 },
  { id: 'air_purifier', label: '🌿 Air purifier (plant)', tier: 1 },
  // Tier 2 (Shoreditch)
  { id: 'second_bed', label: '🛏️ Luxury second bedroom', tier: 2 },
  { id: 'dishwasher', label: '🍽️ Dishwasher', tier: 2 },
  { id: 'smart_tv_2', label: '📺📺 Two TVs', tier: 2 },
  { id: 'bathroom_reno', label: '🚿 Bathroom renovation', tier: 2 },
  { id: 'rooftop', label: '🌆 Rooftop terrace', tier: 2 },
  { id: 'record_player', label: '🎵 Vinyl record player', tier: 2 },
  // Tier 3 (Chelsea)
  { id: 'kitchen_reno', label: '🍳 Kitchen renovation', tier: 3 },
  { id: 'garden_land', label: '🌸 Garden landscaping', tier: 3 },
  { id: 'smart_home', label: '💡 Smart home', tier: 3 },
  { id: 'cinema', label: '🎬 Cinema room', tier: 3 },
  { id: 'lux_baths', label: '🛁 Luxury bathrooms', tier: 3 },
  { id: 'gym', label: '💪 Home gym', tier: 3 },
  { id: 'wine_fridge', label: '🍷 Wine fridge', tier: 3 },
  // Tier 4 (Mayfair)
  { id: 'smart_home_2', label: '🏠 Full smart home', tier: 4 },
  { id: 'home_cinema', label: '🎬 Private cinema', tier: 4 },
  { id: 'chef_kitchen', label: '👨‍🍳 Chef\'s kitchen', tier: 4 },
  { id: 'spa_bath', label: '🧖 Spa bathroom', tier: 4 },
  { id: 'art', label: '🖼️ Curated art collection', tier: 4 },
  { id: 'wine_cellar', label: '🍷 Wine cellar', tier: 4 },
  // Tier 5 (Kensington)
  { id: 'michelin', label: '🌟 Michelin-standard kitchen', tier: 5 },
  { id: 'cinema20', label: '🎬 20-seat cinema', tier: 5 },
  { id: 'pool', label: '🏊 Indoor pool', tier: 5 },
  { id: 'art_gallery', label: '🖼️ Private gallery wing', tier: 5 },
];

const TIER_NAMES = ['Notting Hill', 'Shoreditch', 'Chelsea', 'Mayfair', 'Kensington'];

const state = {
  tier: 0,
  upgrades: new Set(),
  time: 'day',
  mode: 'orbit',
  roof: false,
};

// Mount viewer
const sceneEl = document.getElementById('scene');
const v = Apartment3D.mount(sceneEl, {
  tier: state.tier,
  upgrades: [...state.upgrades],
  time: state.time,
});

// Render upgrade list
const upList = document.getElementById('upList');
function renderUpgrades() {
  upList.innerHTML = '';
  UPGRADES.forEach(u => {
    const row = document.createElement('label');
    row.className = 'upgrade-row' + (state.upgrades.has(u.id) ? ' on' : '');
    row.innerHTML = `<input type="checkbox" ${state.upgrades.has(u.id) ? 'checked' : ''}> <span>${u.label}</span>`;
    row.querySelector('input').addEventListener('change', (e) => {
      if (e.target.checked) state.upgrades.add(u.id);
      else state.upgrades.delete(u.id);
      v.update({ upgrades: [...state.upgrades] });
      updateHeader();
      renderUpgrades();
    });
    upList.appendChild(row);
  });
}
renderUpgrades();

function updateHeader() {
  document.getElementById('tierName').textContent = TIER_NAMES[state.tier];
  document.getElementById('upCount').textContent = `${state.upgrades.size} upgrades · ${state.time}`;
}
updateHeader();

// Tier buttons
document.querySelectorAll('.tier-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.tier = parseInt(btn.dataset.tier);
    v.update({ tier: state.tier });
    updateHeader();
  });
});

// Time buttons
document.querySelectorAll('.time-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.time = btn.dataset.time;
    v.setTime(state.time);
    updateHeader();
  });
});

// Mode buttons
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.mode = btn.dataset.mode;
    v.setMode(state.mode);
    // Update help text
    const help = document.getElementById('helpText');
    if (state.mode === 'orbit') help.innerHTML = 'Drag · Rotate<br>Scroll/pinch · Zoom';
    if (state.mode === 'top') help.textContent = 'Top-down floor plan';
    if (state.mode === 'walk') help.innerHTML = 'WASD/joystick · Move<br>Drag · Look';
    // Show joystick on touch devices in walk mode
    const joy = document.getElementById('joystick');
    joy.style.display = (state.mode === 'walk' && 'ontouchstart' in window) ? 'block' : 'none';
  });
});

// Roof button
const roofBtn = document.getElementById('roofBtn');
roofBtn.addEventListener('click', () => {
  state.roof = !state.roof;
  v.setRoof(state.roof);
  roofBtn.textContent = state.roof ? 'Roof on' : 'Roof off';
});

// Touch joystick (visible only in walk mode on touch devices)
const joy = document.getElementById('joystick');
const knob = document.getElementById('joyKnob');
let joyActive = false;
const joyCenter = { x: 0, y: 0 };
joy.addEventListener('touchstart', (e) => {
  joyActive = true;
  const r = joy.getBoundingClientRect();
  joyCenter.x = r.left + r.width / 2;
  joyCenter.y = r.top + r.height / 2;
  e.preventDefault();
}, { passive: false });
joy.addEventListener('touchmove', (e) => {
  if (!joyActive) return;
  const t = e.touches[0];
  const dx = t.clientX - joyCenter.x;
  const dy = t.clientY - joyCenter.y;
  const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 45);
  const ang = Math.atan2(dy, dx);
  const kx = Math.cos(ang) * dist;
  const ky = Math.sin(ang) * dist;
  knob.style.transform = `translate(${-21 + kx}px, ${-21 + ky}px)`;
  v.setJoystick(kx / 45, ky / 45);
  e.preventDefault();
}, { passive: false });
joy.addEventListener('touchend', () => {
  joyActive = false;
  knob.style.transform = `translate(-21px, -21px)`;
  v.setJoystick(0, 0);
});

</script>
</body>
</html>
