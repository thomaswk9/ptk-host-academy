# PTK Host Academy — Render deployment config

services:
  - type: web
    name: ptk-host-academy
    runtime: node
    plan: free                   # bump to "starter" ($7/mo) for always-on
    region: frankfurt            # closest Render region to UK
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # If you want the leaderboard to persist across deploys, attach a disk
      # in the Render dashboard and set LEADERBOARD_PATH to a path on it.
      # - key: LEADERBOARD_PATH
      #   value: /var/data/ptk-leaderboard.json
